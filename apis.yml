description: >-
  Elexon is the UK's Balancing and Settlement Code (BSC) Company, responsible for
  administering the electricity balancing and settlement arrangements in Great Britain.
  As the operator of the Balancing Mechanism Reporting Service (BMRS), Elexon publishes
  a publicly accessible REST API — the Insights Solution API — that provides free, no-key
  access to real-time and historical data from the UK electricity market. The API covers
  balancing mechanism dynamic and physical data per Balancing Mechanism Unit (BMU),
  bid-offer acceptances, balancing services adjustments, physical notifications, generation
  availability forecasts, settlement reports, meter readings, and UK market transparency
  data mandated under European legislation. All data is returned in JSON, XML, or CSV
  format. A companion near-real-time push service (IRIS — Insights Real-time Information
  Service) streams the same datasets over WebSocket/STOMP for latency-sensitive consumers.
  The API is freely accessible to industry participants and the public with no registration
  or API key required, and data may be reused with attribution ("Contains BMRS data
  © Elexon Limited copyright and database right").
